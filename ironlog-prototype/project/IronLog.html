<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronLog</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  input { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }

  /* ── Screen transitions ──────────────────────────────────────── */
  @keyframes slideInRight  { from { transform: translateX(100%); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideInLeft   { from { transform: translateX(-100%); opacity: 0.6; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeInTab     { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .anim-forward { animation: slideInRight 0.28s cubic-bezier(0.32,0,0.22,1) both; }
  .anim-back    { animation: slideInLeft  0.28s cubic-bezier(0.32,0,0.22,1) both; }
  .anim-tab     { animation: fadeInTab    0.22s ease both; }

  /* ── Toast ───────────────────────────────────────────────────── */
  .toast {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(30,30,30,0.95); color: #fff; border-radius: 20px;
    padding: 9px 20px; font-size: 13px; font-weight: 600; white-space: nowrap;
    pointer-events: none; z-index: 200;
    animation: toastIn .25s ease, toastOut .3s ease 1.8s forwards;
  }
  @keyframes toastIn  { from { opacity:0; transform: translateX(-50%) translateY(12px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
</style>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
    <rect width="120" height="80" fill="#111"/>
    <rect x="35" y="10" width="50" height="60" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="42" y="20" width="36" height="6" rx="3" fill="#7c6ef2" opacity="0.8"/>
    <rect x="42" y="30" width="24" height="4" rx="2" fill="#444"/>
    <rect x="42" y="38" width="28" height="4" rx="2" fill="#444"/>
    <rect x="42" y="56" width="36" height="8" rx="4" fill="#7c6ef2"/>
  </svg>
</template>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ironlog-data.jsx"></script>
<script type="text/babel" src="ironlog-common.jsx"></script>
<script type="text/babel" src="ironlog-screens-a.jsx"></script>
<script type="text/babel" src="ironlog-screens-b.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const ACCENT_MAP = {
  purple: { dark: '#7c6ef2', light: '#5b4ff0' },
  blue:   { dark: '#3b9de8', light: '#1a6fa8' },
  green:  { dark: '#3db88a', light: '#1d9e75' },
  orange: { dark: '#e87a3b', light: '#c05820' },
};

function App() {
  const [dark, setDark] = React.useState(true);
  const [accentKey, setAccentKey] = React.useState('purple');
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const toastTimer = React.useRef(null);

  const showToast = (msg) => {
    setToast(null);
    clearTimeout(toastTimer.current);
    requestAnimationFrame(() => {
      setToast(msg);
      toastTimer.current = setTimeout(() => setToast(null), 2200);
    });
  };

  const accentColor = ACCENT_MAP[accentKey][dark ? 'dark' : 'light'];
  const t = {
    ...getTheme(dark),
    accent: accentColor,
    accentBg: dark ? 'rgba(124,110,242,0.13)' : 'rgba(91,79,240,0.09)',
    accentBorder: dark ? '#3a2060' : '#c0b0f4',
  };

  // Tweaks protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Navigation
  const [tab, setTabRaw] = React.useState('workout');
  const [stacks, setStacks] = React.useState({
    workout:   ['dashboard'],
    exercises: ['exercises'],
    progress:  ['progress'],
    profile:   ['profile'],
  });
  const [paramsMap, setParamsMap] = React.useState({});
  const [activeWorkout, setActiveWorkout] = React.useState(null);

  // Animation state
  const [animKey, setAnimKey] = React.useState(0);
  const [animDir, setAnimDir] = React.useState('tab');

  const currentStack = stacks[tab] || ['dashboard'];
  const currentScreen = currentStack[currentStack.length - 1];
  const currentParams = paramsMap[tab]?.[currentScreen] || {};

  const navigate = React.useCallback((screen, params = {}) => {
    if (screen === 'exercises' && tab !== 'exercises') {
      setTabRaw('exercises');
      setAnimDir('tab');
      setAnimKey(k => k + 1);
      return;
    }
    setAnimDir('forward');
    setAnimKey(k => k + 1);
    setStacks(prev => ({ ...prev, [tab]: [...(prev[tab] || []), screen] }));
    setParamsMap(prev => ({ ...prev, [tab]: { ...(prev[tab] || {}), [screen]: params } }));
  }, [tab]);

  const goBack = React.useCallback(() => {
    setStacks(prev => {
      const stack = prev[tab] || [];
      if (stack.length <= 1) return prev;
      setAnimDir('back');
      setAnimKey(k => k + 1);
      return { ...prev, [tab]: stack.slice(0, -1) };
    });
  }, [tab]);

  const setTab = (newTab) => {
    setTabRaw(newTab);
    setAnimDir('tab');
    setAnimKey(k => k + 1);
    if (newTab === 'workout' && activeWorkout) {
      setStacks(prev => ({ ...prev, workout: ['active-workout'] }));
    }
  };

  const startWorkout = ({ name, exercises }) => {
    const workout = { name, exercises };
    setActiveWorkout(workout);
    setTabRaw('workout');
    setAnimDir('forward');
    setAnimKey(k => k + 1);
    setStacks(prev => ({ ...prev, workout: ['active-workout'] }));
    setParamsMap(prev => ({ ...prev, workout: { ...(prev.workout || {}), 'active-workout': { workout } } }));
  };

  const finishWorkout = () => {
    setActiveWorkout(null);
    setAnimDir('back');
    setAnimKey(k => k + 1);
    setStacks(prev => ({ ...prev, workout: ['dashboard'] }));
  };

  const animClass = animDir === 'forward' ? 'anim-forward' : animDir === 'back' ? 'anim-back' : 'anim-tab';

  const commonProps = { navigate, goBack, params: currentParams, t, dark, showToast };

  const renderScreen = () => {
    switch (currentScreen) {
      case 'dashboard':       return <ScreenDashboard {...commonProps} />;
      case 'log':             return <ScreenWorkoutLog {...commonProps} />;
      case 'program':         return <ScreenProgram {...commonProps} />;
      case 'workout-builder': return <ScreenWorkoutBuilder {...commonProps} onStartWorkout={startWorkout} />;
      case 'active-workout':  return <ScreenActiveWorkout {...commonProps} params={{ workout: activeWorkout || currentParams.workout }} onFinishWorkout={finishWorkout} />;
      case 'exercises':       return <ScreenExercises {...commonProps} />;
      case 'exercise-card':   return <ScreenExerciseCard {...commonProps} />;
      case 'progress':        return <ScreenProgress {...commonProps} />;
      case 'profile':         return <ScreenProfile {...commonProps} />;
      default:                return <ScreenDashboard {...commonProps} />;
    }
  };

  const showNav = currentScreen !== 'active-workout';

  const jumpTo = (toTab, screen, params) => {
    setTabRaw(toTab);
    setAnimDir('tab');
    setAnimKey(k => k + 1);
    setStacks(prev => ({ ...prev, [toTab]: [screen] }));
    if (params) setParamsMap(prev => ({ ...prev, [toTab]: { ...(prev[toTab] || {}), [screen]: params } }));
  };

  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'center', gap: 48, flexWrap: 'wrap' }}>
      {/* Phone */}
      <div>
        <div style={{ fontSize: 12, color: '#555', textAlign: 'center', marginBottom: 10, letterSpacing: '0.3px' }}>
          {dark ? '■ Тёмная' : '○ Светлая'} · IronLog
        </div>
        <div style={{
          width: 375, height: 812, borderRadius: 44, overflow: 'hidden',
          border: `2px solid ${dark ? '#2a2a2a' : '#ddd'}`,
          boxShadow: `0 40px 100px ${dark ? 'rgba(0,0,0,0.85)' : 'rgba(0,0,0,0.18)'}`,
          background: t.bg, display: 'flex', flexDirection: 'column',
          position: 'relative',
        }}>
          <StatusBar dark={dark} t={t} />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: t.bg, position: 'relative' }}>
            {/* Animated screen wrapper */}
            <div key={animKey} className={animClass} style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              {renderScreen()}
            </div>
          </div>
          {showNav && <BottomNav tab={tab} setTab={setTab} hasActiveWorkout={!!activeWorkout} t={t} dark={dark} />}
          {/* Toast */}
          {toast && <div className="toast">{toast}</div>}
        </div>
      </div>

      {/* Tweaks Panel */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 999,
          background: dark ? '#1a1a1a' : '#fff',
          border: `1px solid ${dark ? '#2a2a2a' : '#e0e0e0'}`,
          borderRadius: 20, padding: 20, width: 268,
          boxShadow: '0 8px 48px rgba(0,0,0,0.5)',
          fontFamily: '-apple-system, sans-serif',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: dark ? '#fff' : '#111' }}>Tweaks</span>
            <div onClick={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} style={{ cursor: 'pointer', color: dark ? '#555' : '#aaa', fontSize: 20, lineHeight: 1, paddingLeft: 8 }}>×</div>
          </div>

          {/* Theme */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: dark ? '#555' : '#aaa', textTransform: 'uppercase', letterSpacing: '0.7px', marginBottom: 8 }}>Тема</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {[{ v: true, l: '🌑 Тёмная' }, { v: false, l: '☀️ Светлая' }].map(opt => (
                <div key={String(opt.v)} onClick={() => setDark(opt.v)} style={{
                  flex: 1, padding: '9px 0', borderRadius: 10, textAlign: 'center', cursor: 'pointer',
                  fontSize: 12, fontWeight: 600,
                  background: dark === opt.v ? t.accent : (dark ? '#252525' : '#efefef'),
                  color: dark === opt.v ? '#fff' : (dark ? '#777' : '#999'),
                  transition: 'all .15s',
                }}>{opt.l}</div>
              ))}
            </div>
          </div>

          {/* Accent */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: dark ? '#555' : '#aaa', textTransform: 'uppercase', letterSpacing: '0.7px', marginBottom: 8 }}>Акцент</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {Object.entries(ACCENT_MAP).map(([key, val]) => (
                <div key={key} onClick={() => setAccentKey(key)} style={{
                  flex: 1, height: 34, borderRadius: 10, cursor: 'pointer',
                  background: val[dark ? 'dark' : 'light'],
                  border: accentKey === key ? `2.5px solid ${dark ? '#fff' : '#222'}` : '2.5px solid transparent',
                  transform: accentKey === key ? 'scale(1.08)' : 'scale(1)',
                  transition: 'all .15s',
                  position: 'relative',
                }}>
                  {accentKey === key && <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>✓</div>}
                </div>
              ))}
            </div>
          </div>

          {/* Quick nav */}
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: dark ? '#555' : '#aaa', textTransform: 'uppercase', letterSpacing: '0.7px', marginBottom: 8 }}>Быстрый переход</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
              {[
                { label: 'Дашборд', toTab: 'workout', screen: 'dashboard' },
                { label: 'Конструктор', toTab: 'workout', screen: 'workout-builder', params: { template: WORKOUT_TEMPLATES[0] } },
                { label: 'Упражнения', toTab: 'exercises', screen: 'exercises' },
                { label: 'Карточка упр.', toTab: 'exercises', screen: 'exercise-card', params: { exercise: EXERCISES[0] } },
                { label: 'Прогресс', toTab: 'progress', screen: 'progress' },
                { label: 'Программа', toTab: 'workout', screen: 'program' },
                { label: 'История', toTab: 'workout', screen: 'log' },
                { label: 'Профиль', toTab: 'profile', screen: 'profile' },
              ].map(item => (
                <div key={item.screen} onClick={() => { jumpTo(item.toTab, item.screen, item.params); }} style={{
                  padding: '8px 10px', borderRadius: 10, cursor: 'pointer', fontSize: 12, fontWeight: 500,
                  textAlign: 'center', background: dark ? '#252525' : '#f0f0f0', color: dark ? '#aaa' : '#666',
                  transition: 'background .1s',
                }}>{item.label}</div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
